<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>New project — Scandit</title>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    // Scandit semantic tokens, declared as Tailwind theme colors so JSX stays clean.
    // Hex values from references/design.md (Web mode tokens).
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          colors: {
            // background
            'bg-primary':   '#FFFFFF',
            'bg-secondary': '#F7F7F7',
            'bg-brand':     '#141F2E',

            // surface
            'surface-default':              '#FFFFFF',
            'surface-hover':                '#F3F5F8',
            'surface-pressed':              '#E1E7ED',
            'surface-selected':             '#EFF5FA',
            'surface-interactive':          '#1047A1',
            'surface-interactive-hover':    '#1660D9',
            'surface-interactive-pressed':  '#063073',
            'surface-brand-softer':         '#EFF5FA',
            'surface-success-soft':         '#CEF2DC',
            'surface-success-softer':       '#E6F9EE',
            'surface-warning-soft':         '#FFF1CC',
            'surface-danger-soft':          '#FFD9D9',
            'surface-danger-softer':        '#FFE8E8',
            'surface-info-soft':            '#D9E7FF',
            'surface-info-softer':          '#ECF3FF',
            'surface-neutral-softer':       '#F3F5F8',

            // text
            'text-primary':     '#16191C',
            'text-secondary':   '#525A61',
            'text-disabled':    '#ACB6BF',
            'text-inverted':    '#FFFFFF',
            'text-brand':       '#0A3390',
            'text-info':        '#1660D9',
            'text-positive':    '#0D853D',
            'text-warning':     '#4D3800',
            'text-danger':      '#D92121',
            'text-on-red':      '#800606',

            // border
            'border-primary':   '#525A61',
            'border-secondary': '#C7CFD6',
            'border-tertiary':  '#E1E7ED',
            'border-info':      '#1660D9',
            'border-success':   '#0D853D',
            'border-danger':    '#D92121',

            // icon
            'icon-primary':   '#16191C',
            'icon-secondary': '#6C7680',
            'icon-info':      '#3683FF',
            'icon-positive':  '#0D853D',
            'icon-warning':   '#4D3800',
            'icon-danger':    '#D92121',

            // overlay scrim
            'overlay-dark':    'rgba(0, 0, 0, 0.40)',
          },
          boxShadow: {
            // Scandit ambient pure-vertical shadows
            'sd-card':   '0 0 4px 0 rgba(27, 32, 38, 0.08)',
            'sd-hover':  '0 0 8px 0 rgba(27, 32, 38, 0.08)',
            'sd-pop':    '0 0 16px 0 rgba(27, 32, 38, 0.08)',
            'sd-modal':  '0 0 32px 0 rgba(27, 32, 38, 0.08)',
          },
          borderRadius: {
            'sd-input':  '4px',
            'sd-btn':    '8px',
            'sd-card':   '16px',
          },
          letterSpacing: {
            'sd-label': '0.25px',
          },
        },
      },
    };
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body class="bg-bg-secondary text-text-primary">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // Scandit-approved inline icons (close, chevron-down)
    const CloseIcon = (props) => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth="2"
           strokeLinecap="round" strokeLinejoin="round" {...props}>
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    );
    const ChevronDown = (props) => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" strokeWidth="2"
           strokeLinecap="round" strokeLinejoin="round" {...props}>
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    );

    function NewProjectModal({ open, onClose, onCreate }) {
      const [name, setName] = useState('');
      const [type, setType] = useState('Inventory');
      const [description, setDescription] = useState('');
      const [submitted, setSubmitted] = useState(false);
      const firstFieldRef = useRef(null);

      const MAX = 280;
      const trimmedDesc = description.slice(0, MAX);
      const counterTone =
        trimmedDesc.length >= MAX ? 'text-text-danger' :
        trimmedDesc.length >= MAX - 30 ? 'text-text-primary' :
                                          'text-text-secondary';

      const nameError = submitted && name.trim().length === 0;

      useEffect(() => {
        if (open) setTimeout(() => firstFieldRef.current?.focus(), 0);
      }, [open]);

      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape' && open) onClose(); };
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [open, onClose]);

      if (!open) return null;

      const handleSubmit = (e) => {
        e.preventDefault();
        setSubmitted(true);
        if (name.trim().length === 0) return;
        onCreate({ name: name.trim(), type, description: trimmedDesc });
      };

      return (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center bg-overlay-dark px-4"
          onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}
          role="dialog" aria-modal="true" aria-labelledby="new-project-title"
        >
          <form
            onSubmit={handleSubmit}
            className="w-full max-w-[480px] bg-surface-default rounded-sd-card shadow-sd-modal
                       border border-border-tertiary overflow-hidden"
            noValidate
          >
            {/* Header */}
            <div className="flex items-start justify-between gap-4 px-6 pt-6 pb-4">
              <div>
                <h2 id="new-project-title" className="text-lg font-semibold tracking-tight">
                  New project
                </h2>
                <p className="mt-1 text-sm text-text-secondary">
                  Create a workspace for scanning, analytics, and team collaboration.
                </p>
              </div>
              <button
                type="button"
                onClick={onClose}
                aria-label="Close"
                tabIndex={6}
                className="text-icon-secondary hover:text-icon-primary
                           hover:bg-surface-hover rounded-sd-btn p-1.5
                           transition-colors"
              >
                <CloseIcon />
              </button>
            </div>

            {/* Body */}
            <div className="px-6 pb-2 space-y-5">
              {/* Project name */}
              <label className="block">
                <span className="block text-sm font-medium tracking-sd-label mb-1.5">
                  Project name
                  <span className="text-text-danger ml-0.5" aria-hidden="true">*</span>
                  <span className="sr-only"> (required)</span>
                </span>
                <input
                  ref={firstFieldRef}
                  tabIndex={1}
                  type="text"
                  required
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  aria-invalid={nameError || undefined}
                  aria-describedby={nameError ? 'name-error' : undefined}
                  placeholder="e.g. Warehouse pilot — Zurich DC"
                  className={[
                    "block w-full text-sm font-normal",
                    "rounded-sd-input px-3 py-2 bg-surface-default text-text-primary",
                    "placeholder:text-text-disabled",
                    "border focus:outline-none",
                    "focus:ring-2 focus:ring-surface-interactive/15 focus:border-surface-interactive",
                    nameError
                      ? "border-border-danger focus:border-border-danger focus:ring-surface-danger/20"
                      : "border-border-secondary",
                  ].join(' ')}
                />
                {nameError && (
                  <p id="name-error" className="mt-1.5 text-sm text-text-danger">
                    Project name is required.
                  </p>
                )}
              </label>

              {/* Project type */}
              <label className="block">
                <span className="block text-sm font-medium tracking-sd-label mb-1.5">
                  Project type
                </span>
                <div className="relative">
                  <select
                    tabIndex={2}
                    value={type}
                    onChange={(e) => setType(e.target.value)}
                    className="block w-full appearance-none text-sm font-normal
                               rounded-sd-input px-3 py-2 pr-10
                               bg-surface-default text-text-primary
                               border border-border-secondary
                               focus:outline-none focus:ring-2 focus:ring-surface-interactive/15
                               focus:border-surface-interactive"
                  >
                    <option>Inventory</option>
                    <option>Receiving</option>
                    <option>Search</option>
                  </select>
                  <span className="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-icon-secondary">
                    <ChevronDown />
                  </span>
                </div>
              </label>

              {/* Description */}
              <label className="block">
                <div className="flex items-baseline justify-between mb-1.5">
                  <span className="text-sm font-medium tracking-sd-label">
                    Description <span className="text-text-secondary font-normal">(optional)</span>
                  </span>
                  <span
                    aria-live="polite"
                    className={`text-xs font-medium tabular-nums ${counterTone}`}
                  >
                    {trimmedDesc.length} / {MAX}
                  </span>
                </div>
                <textarea
                  tabIndex={3}
                  value={description}
                  onChange={(e) => setDescription(e.target.value.slice(0, MAX))}
                  maxLength={MAX}
                  rows={4}
                  placeholder="What is this project for? Add context for your team."
                  className="block w-full text-sm font-normal resize-y
                             rounded-sd-input px-3 py-2
                             bg-surface-default text-text-primary
                             placeholder:text-text-disabled
                             border border-border-secondary
                             focus:outline-none focus:ring-2 focus:ring-surface-interactive/15
                             focus:border-surface-interactive"
                />
              </label>
            </div>

            {/* Footer */}
            <div className="flex items-center justify-end gap-2 px-6 py-4 mt-2
                            border-t border-border-tertiary bg-surface-default">
              <button
                type="button"
                onClick={onClose}
                tabIndex={4}
                className="text-base font-medium tracking-sd-label
                           px-4 py-2 rounded-sd-btn text-text-primary
                           hover:bg-surface-hover active:bg-surface-pressed
                           transition-colors"
              >
                Cancel
              </button>
              <button
                type="submit"
                tabIndex={5}
                className="text-base font-medium
                           px-4 py-2 rounded-sd-btn text-text-inverted
                           bg-surface-interactive
                           hover:bg-surface-interactive-hover
                           active:bg-surface-interactive-pressed
                           transition-colors
                           focus:outline-none focus:ring-2 focus:ring-surface-interactive/30 focus:ring-offset-2"
              >
                Create project
              </button>
            </div>
          </form>
        </div>
      );
    }

    function App() {
      const [open, setOpen] = useState(true);
      const [last, setLast] = useState(null);
      return (
        <div className="min-h-screen bg-bg-secondary">
          {/* Faint dashboard backdrop so the dimmed scrim reads as a real app */}
          <div className="max-w-[1280px] mx-auto px-8 py-10">
            <div className="flex items-center justify-between mb-8">
              <div>
                <div className="text-xs font-semibold tracking-[0.08em] uppercase text-text-secondary mb-2">
                  Workspace
                </div>
                <h1 className="text-3xl font-semibold tracking-tight">Projects</h1>
                <p className="text-sm text-text-secondary mt-1">Manage scanning projects across your team.</p>
              </div>
              <button
                onClick={() => setOpen(true)}
                className="text-sm font-medium px-4 py-2 rounded-sd-btn text-text-inverted
                           bg-surface-interactive hover:bg-surface-interactive-hover">
                New project
              </button>
            </div>
            <div className="grid grid-cols-3 gap-4">
              {Array.from({ length: 6 }).map((_, i) => (
                <div key={i} className="bg-surface-default border border-border-tertiary
                                         rounded-sd-card p-6 shadow-sd-card">
                  <div className="h-3 w-24 bg-surface-neutral-softer rounded-full mb-3" />
                  <div className="h-5 w-40 bg-surface-neutral-softer rounded-full mb-6" />
                  <div className="h-3 w-full bg-surface-neutral-softer rounded-full mb-2" />
                  <div className="h-3 w-2/3 bg-surface-neutral-softer rounded-full" />
                </div>
              ))}
            </div>
            {last && (
              <div className="mt-6 text-sm text-text-secondary">
                Last created: <strong className="text-text-primary">{last.name}</strong> · {last.type}
              </div>
            )}
          </div>

          <NewProjectModal
            open={open}
            onClose={() => setOpen(false)}
            onCreate={(p) => { setLast(p); setOpen(false); }}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
